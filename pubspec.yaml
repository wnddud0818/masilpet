    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cloud_firestore: ">=5.0.0 <7.0.0"
  cloud_functions: ">=5.0.0 <7.0.0"
  firebase_auth: ">=5.0.0 <7.0.0"
  firebase_core: ">=3.0.0 <5.0.0"
  flutter_riverpod: ">=2.5.0 <3.0.0"
  geolocator: ">=12.0.0 <15.0.0"
  go_router: ">=14.0.0 <17.0.0"
  flutter_map: ^8.3.0
  latlong2: ^0.9.1
  cupertino_icons: ^1.0.9
  shared_preferences: ^2.5.5
  url_launcher: ^6.3.2
  web: ^1.1.1

dev_dependencies:
