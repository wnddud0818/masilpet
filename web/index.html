<!DOCTYPE html>
<html lang="ko">
<head>
  <!--
    Firebase Hosting 루트 배포 기준의 base href입니다.
    Flutter Web 빌드가 $FLUTTER_BASE_HREF를 실제 배포 경로로 치환합니다.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="대한민국 전역을 걸으며 체크인하고 지역 맥락을 가진 마실펫을 수집·성장시키는 위치 기반 앱입니다.">
  <meta name="application-name" content="MasilPet">
  <meta name="robots" content="index,follow">
  <meta name="theme-color" content="#0F766E">
  <meta name="color-scheme" content="light">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="MasilPet">
  <meta property="og:locale" content="ko_KR">
  <meta property="og:title" content="MasilPet">
  <meta property="og:description" content="대한민국을 걸으며 만나는 나만의 마실펫">
  <meta property="og:image" content="/screenshots/onboarding-wide.png">
  <meta property="og:image:width" content="1280">
  <meta property="og:image:height" content="720">
  <meta property="og:image:alt" content="MasilPet 온보딩과 지역 탐험 소개 화면">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="MasilPet">
  <meta name="twitter:description" content="대한민국을 걸으며 만나는 나만의 마실펫">
  <meta name="twitter:image" content="/screenshots/onboarding-wide.png">
  <meta name="twitter:image:alt" content="MasilPet 온보딩과 지역 탐험 소개 화면">
  <link rel="privacy-policy" href="/privacy.html">
  <style>
    :root {
      color-scheme: light;
      background: #F7F7F2;
      color: #1F2933;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #F7F7F2;
    }

    #loading-shell,
    .fallback-shell {
      min-height: 100vh;
      box-sizing: border-box;
      display: grid;
      place-items: center;
      padding: 28px;
      text-align: center;
    }

    .loading-content,
    .fallback-content {
      max-width: 520px;
    }

    .loading-mark {
      width: 54px;
      height: 54px;
      margin: 0 auto 20px;
      border-radius: 50%;
      background: #0F766E;
      display: grid;
      place-items: center;
      color: white;
      font-weight: 800;
      font-size: 24px;
    }

    .loading-spinner {
      width: 36px;
      height: 36px;
      margin: 22px auto 0;
      border-radius: 50%;
      border: 4px solid #D7E4DF;
      border-top-color: #0F766E;
      animation: spin 0.9s linear infinite;
    }

    .loading-content h1,
    .fallback-content h1 {
      margin: 0 0 8px;
      font-size: 30px;
      line-height: 1.2;
    }

    .loading-content p,
    .fallback-content p {
      margin: 0;
      color: #475569;
      line-height: 1.7;
    }

    .fallback-content a {
      color: #0F766E;
      font-weight: 700;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .loading-spinner {
        animation: none;
      }
    }
  </style>

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="MasilPet">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>MasilPet</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <div id="loading-shell" role="status" aria-live="polite" aria-label="MasilPet 앱 로딩 중">
    <div class="loading-content">
      <div class="loading-mark" aria-hidden="true">M</div>
      <h1>MasilPet</h1>
      <p>대한민국을 걸으며 만나는 나만의 마실펫을 준비하고 있습니다.</p>
      <div class="loading-spinner" aria-hidden="true"></div>
    </div>
  </div>
  <noscript>
    <style>
      #loading-shell {
        display: none;
      }
    </style>
    <main class="fallback-shell">
      <div class="fallback-content">
        <h1>MasilPet</h1>
        <p>앱을 사용하려면 브라우저에서 JavaScript를 켜야 합니다. 개인정보 처리방침은 <a href="/privacy.html">/privacy.html</a>에서 확인할 수 있습니다.</p>
      </div>
    </main>
  </noscript>
  <script>
    window.addEventListener('flutter-first-frame', function () {
      var loadingShell = document.getElementById('loading-shell');
      if (loadingShell) {
        loadingShell.remove();
      }
    });
  </script>
  <!-- Flutter Web 부트스트랩. 첫 프레임 전에는 위 로딩 셸이 표시됩니다. -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
