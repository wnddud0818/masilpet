name: masilpet
description: MasilPet location-based pet raising app.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cloud_firestore: ">=5.0.0 <7.0.0"
  cloud_functions: ">=5.0.0 <7.0.0"
  firebase_auth: ">=5.0.0 <7.0.0"
  firebase_core: ">=3.0.0 <5.0.0"
  flutter_riverpod: ">=2.5.0 <3.0.0"
  geolocator: ">=12.0.0 <15.0.0"
  go_router: ">=14.0.0 <17.0.0"

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ">=4.0.0 <7.0.0"

flutter:
  uses-material-design: true
  assets:
    - assets/pets/wave_naru/actions/
    - assets/pets/wave_naru/emotions/
    - assets/pets/wave_naru/growth/
    - assets/pets/harbor_maru/actions/
    - assets/pets/harbor_maru/emotions/
    - assets/pets/harbor_maru/growth/
    - assets/pets/film_bori/actions/
    - assets/pets/film_bori/emotions/
    - assets/pets/film_bori/growth/
    - assets/pets/spring_dami/actions/
    - assets/pets/spring_dami/emotions/
    - assets/pets/spring_dami/growth/
    - assets/pets/story_goun/actions/
    - assets/pets/story_goun/emotions/
    - assets/pets/story_goun/growth/
    - assets/pets/autumn_leaf_sprite/actions/
    - assets/pets/autumn_leaf_sprite/emotions/
    - assets/pets/autumn_leaf_sprite/growth/
    - assets/pets/autumn_leaf_sprite/animations/
    - assets/pets/wink_yellow_pup/actions/
    - assets/pets/wink_yellow_pup/emotions/
    - assets/pets/wink_yellow_pup/growth/
    - assets/pets/wink_yellow_pup/animations/
    - assets/pets/bandana_tanuki/actions/
    - assets/pets/bandana_tanuki/emotions/
    - assets/pets/bandana_tanuki/growth/
    - assets/pets/bandana_tanuki/animations/
